<!DOCTYPE html>
<html>
<head>
  <title>E-Bookshop</title>
</head>
<body>
  <h2>Yet Another e-Bookshop</h2>
  <form method="post" action="register">
    <script>        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === '1') {
            document.write("<p style='color: red;'>Error: Username already exists. Please choose a different username.</p>");
        }
        else if (urlParams.get('error') === '2') {
            document.write("<p style='color: red;'>Error: Passwords do not match. Please try again.</p>");
        }
    </script>
    <p>Username: <input type='text' name='username' /></p>
    <p>Password: <input type='password' name='password' /></p>
    <p>Confirm Password: <input type='password' name='confirm_password' /></p>
    <label for="role">You are a:</label>
    <select name="role" id="role">
      <option value="customer">Customer</option>
      <option value="seller">Seller</option>
    </select>
    <input type="submit" value="Register" />
  </form>
</body>
</html>
