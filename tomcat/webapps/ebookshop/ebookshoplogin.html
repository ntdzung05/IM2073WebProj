<!DOCTYPE html>
<html>
<head>
  <title>E-Bookshop</title>
</head>
<body>
  <h2>Yet Another e-Bookshop</h2>
  <form method="post" action="login">
    <script>        
        const urlParams = new URLSearchParams(window.location.search);
        if (urlParams.get('error') === '1') {
            document.write("<p style='color: red;'>Error: Invalid username or password. Please try again.</p>");
        }
        if (urlParams.get('success') === '1') {
            document.write("<p style='color: green;'>Success: You have registered successfully, please log in now.</p>");
        }
    </script>
    <p>Username: <input type='text' name='username' /></p>
    <p>Password: <input type='password' name='password' /></p>
    <input type="submit" value="Login" />
  </form>
  <p>Don't have an account? <a href="ebookshopregister.html">Register here</a>.</p>
</body>
</html>
